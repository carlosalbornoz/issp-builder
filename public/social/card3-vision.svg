<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D2B5E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="p1grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FCD116;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5A623;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="p2grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="p3grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg3)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="1080" height="1080" fill="url(#dots)"/>

  <!-- Top accent -->
  <rect x="0" y="0" width="1080" height="5" fill="url(#p1grad)"/>

  <!-- Header -->
  <text x="80" y="95" font-family="system-ui, -apple-system, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="5" fill="rgba(252,209,22,0.8)">THE BIGGER PICTURE</text>
  <text x="80" y="170" font-family="system-ui, -apple-system, Arial, sans-serif" font-size="58" font-weight="900" fill="#FFFFFF">ISSP data is taxpayer</text>
  <text x="80" y="238" font-family="system-ui, -apple-system, Arial, sans-serif" font-size="58" font-weight="900" fill="#FFFFFF">data.</text>
  <text x="80" y="290" font-family="Georgia, serif" font-size="26" font-style="italic" fill="rgba(255,255,255,0.5)">It should be structured, comparable, and publicly accountable.</text>

  <!-- Horizontal connector line -->
  <line x1="80" y1="380" x2="1000" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Phase 1 block -->
  <rect x="80" y="400" width="280" height="370" rx="20" fill="rgba(252,209,22,0.08)" stroke="rgba(252,209,22,0.3)" stroke-width="1.5"/>
  <!-- Phase number -->
  <rect x="80" y="400" width="280" height="5" rx="2.5" fill="url(#p1grad)"/>
  <text x="220" y="465" font-family="system-ui, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="4" fill="#FCD116" text-anchor="middle">PHASE 1</text>
  <text x="220" y="520" font-family="system-ui, Arial, sans-serif" font-size="38" font-weight="900" fill="#FFFFFF" text-anchor="middle">ISSP</text>
  <text x="220" y="560" font-family="system-ui, Arial, sans-serif" font-size="38" font-weight="900" fill="#FFFFFF" text-anchor="middle">Editor</text>
  <!-- Status badge -->
  <rect x="140" y="578" width="160" height="32" rx="16" fill="rgba(252,209,22,0.2)" stroke="#FCD116" stroke-width="1.5"/>
  <circle cx="163" cy="594" r="5" fill="#FCD116"/>
  <text x="220" y="599" font-family="system-ui, Arial, sans-serif" font-size="15" font-weight="700" fill="#FCD116" text-anchor="middle">LIVE NOW</text>
  <!-- Description -->
  <text x="220" y="645" font-family="system-ui, Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.6)" text-anchor="middle">Guided Part I–IV editor.</text>
  <text x="220" y="668" font-family="system-ui, Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.6)" text-anchor="middle">PDF export. Offline-first.</text>
  <text x="220" y="691" font-family="system-ui, Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.6)" text-anchor="middle">No login required.</text>
  <text x="220" y="730" font-family="system-ui, Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.4)" text-anchor="middle">Built → You're here now.</text>

  <!-- Arrow 1→2 -->
  <path d="M 380 585 L 420 585" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="420,580 430,585 420,590" fill="rgba(255,255,255,0.2)"/>

  <!-- Phase 2 block -->
  <rect x="440" y="400" width="280" height="370" rx="20" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.25)" stroke-width="1.5"/>
  <rect x="440" y="400" width="280" height="5" rx="2.5" fill="url(#p2grad)" opacity="0.5"/>
  <text x="580" y="465" font-family="system-ui, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="4" fill="rgba(147,197,253,0.8)" text-anchor="middle">PHASE 2</text>
  <text x="580" y="520" font-family="system-ui, Arial, sans-serif" font-size="38" font-weight="900" fill="rgba(255,255,255,0.6)" text-anchor="middle">ISSP</text>
  <text x="580" y="560" font-family="system-ui, Arial, sans-serif" font-size="38" font-weight="900" fill="rgba(255,255,255,0.6)" text-anchor="middle">Repository</text>
  <!-- Status badge -->
  <rect x="500" y="578" width="160" height="32" rx="16" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
  <text x="580" y="599" font-family="system-ui, Arial, sans-serif" font-size="15" font-weight="700" fill="rgba(147,197,253,0.9)" text-anchor="middle">COMING SOON</text>
  <!-- Description -->
  <text x="580" y="645" font-family="system-ui, Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.45)" text-anchor="middle">Centralized, searchable</text>
  <text x="580" y="668" font-family="system-ui, Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.45)" text-anchor="middle">ISSP archive. Public data</text>
  <text x="580" y="691" font-family="system-ui, Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.45)" text-anchor="middle">instead of scattered PDFs.</text>
  <text x="580" y="730" font-family="system-ui, Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.3)" text-anchor="middle">Structured · Comparable</text>

  <!-- Arrow 2→3 -->
  <path d="M 740 585 L 780 585" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="780,580 790,585 780,590" fill="rgba(255,255,255,0.2)"/>

  <!-- Phase 3 block -->
  <rect x="800" y="400" width="200" height="370" rx="20" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.2)" stroke-width="1.5"/>
  <rect x="800" y="400" width="200" height="5" rx="2.5" fill="url(#p3grad)" opacity="0.4"/>
  <text x="900" y="465" font-family="system-ui, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="rgba(110,231,183,0.7)" text-anchor="middle">PHASE 3</text>
  <text x="900" y="510" font-family="system-ui, Arial, sans-serif" font-size="30" font-weight="900" fill="rgba(255,255,255,0.5)" text-anchor="middle">Budget</text>
  <text x="900" y="548" font-family="system-ui, Arial, sans-serif" font-size="30" font-weight="900" fill="rgba(255,255,255,0.5)" text-anchor="middle">Dashboard</text>
  <!-- Status badge -->
  <rect x="840" y="570" width="120" height="30" rx="15" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1.5"/>
  <text x="900" y="590" font-family="system-ui, Arial, sans-serif" font-size="13" font-weight="700" fill="rgba(110,231,183,0.7)" text-anchor="middle">FUTURE</text>
  <!-- Description -->
  <text x="900" y="640" font-family="system-ui, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" text-anchor="middle">ISSP budgets</text>
  <text x="900" y="660" font-family="system-ui, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" text-anchor="middle">vs. DBM</text>
  <text x="900" y="680" font-family="system-ui, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" text-anchor="middle">releases.</text>
  <text x="900" y="720" font-family="system-ui, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.25)" text-anchor="middle">Accountability</text>

  <!-- Bottom call-to-action -->
  <line x1="80" y1="820" x2="1000" y2="820" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <text x="80" y="880" font-family="system-ui, Arial, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF">If you work in government ICT —</text>
  <text x="80" y="920" font-family="system-ui, Arial, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.65)">this is for you.</text>

  <text x="80" y="970" font-family="system-ui, Arial, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.4)">Open source · Volunteer-built · ISSP Builder · carlosanton.io</text>

  <text x="1000" y="970" font-family="system-ui, Arial, sans-serif" font-size="18" font-weight="700" fill="rgba(252,209,22,0.5)" text-anchor="end">#LingkodBayani</text>
</svg>
