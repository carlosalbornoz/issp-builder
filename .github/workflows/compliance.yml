name: Compliance Gate

# ═══════════════════════════════════════════════════════════════
# GESF Security Gate — blocks PR merges on failures.
# To enable enforcement: Settings → Branches → Branch protection rules
#   → Require status checks → add the job name below.
# ═══════════════════════════════════════════════════════════════

on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * *'

# Triggers on ALL branches and PRs. Branch protection rules
# enforce the gate on the default branch (main/master/trunk/auto).

permissions:
  contents: read
  pull-requests: read

jobs:
  compliance:
    name: GESF Compliance Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          node-version: '22'

      - name: Install GESF
        run: npm install -g @greenarmor/ges@1.5.8

      - name: Initialize GESF
        run: ges init --name "${{ github.event.repository.name }}" --type "government-system" --frameworks "GDPR,OWASP,CIS,NIST,ISO27001,ISO27701" --country "PH" --force

      - name: Run Compliance Audit
        run: ges audit --ci

      - name: Generate Compliance Score
        run: ges score --ci

      - name: Upload Compliance Report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: compliance-report
          path: reports/
